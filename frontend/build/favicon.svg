<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc143c;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunCenter" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background Circle with gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#sunGradient)" stroke="#dc143c" stroke-width="2" />
  
  <!-- Sun center circle -->
  <circle cx="50" cy="50" r="28" fill="url(#sunCenter)" />
  
  <!-- Sun rays (8 rays) -->
  <rect x="48" y="5" width="4" height="12" rx="2" fill="#ffd700" />
  <rect x="48" y="83" width="4" height="12" rx="2" fill="#ffd700" />
  <rect x="5" y="48" width="12" height="4" rx="2" fill="#ffd700" />
  <rect x="83" y="48" width="12" height="4" rx="2" fill="#ffd700" />
  <rect x="20" y="20" width="4" height="12" rx="2" fill="#ffd700" transform="rotate(-45 22 26)" />
  <rect x="76" y="20" width="4" height="12" rx="2" fill="#ffd700" transform="rotate(45 78 26)" />
  <rect x="20" y="68" width="4" height="12" rx="2" fill="#ffd700" transform="rotate(45 22 74)" />
  <rect x="76" y="68" width="4" height="12" rx="2" fill="#ffd700" transform="rotate(-45 78 74)" />
  
  <!-- Letter "A" for Avurudu - larger and bolder -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#dc143c" text-anchor="middle" stroke="#ffffff" stroke-width="1">A</text>
</svg>
